name: string-number-sum-api

on:
  pull_request:
    branches: [main]

jobs:

  check-eslint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: check eslint
        run: npm run eslint
